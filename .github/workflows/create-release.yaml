name: Pogues Back Office release

on:
  push:
    branches:
      - "main"
    paths-ignore:
      [
        "docs/**",
        "Dockerfile",
        "LICENSE",
        "CHANGELOG.md",
        "README.md",
        ".github/**",
      ]

env:
  JAVA_VERSION: "25"
  RELEASE_NOTE_EXCLUDED_TYPES: docs,style,chore,other

jobs:
  pogues-model:
    name: Check Pogues-Model lib version exists
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      available: ${{ steps.check-available.outputs.available }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Pogues-Model Version
        id: get-version
        run: echo "version=$(mvn help:evaluate -Dexpression='pogues-model.version' -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Check if Pogues-Model ${{ steps.get-version.outputs.version }} is available
        id: check-available
        run: |
          mvn dependency:get -Dartifact=fr.insee.pogues:pogues-model:${{steps.get-version.outputs.version}} --no-transfer-progress
          result=$?
          if [[ $result -eq 0 ]]; then
            echo "Pogues-Model ${{steps.get-version.outputs.version}} is available."
            echo "available=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "available=false" >> $GITHUB_OUTPUT

      - name: Check Pogues-Model lib tag ${{ steps.get-version.outputs.version }} existence
        id: check-tag-exists
        uses: mukunku/tag-exists-action@v1.7.0
        with:
          repo: InseeFr/Pogues-Model
          tag: ${{ steps.get-version.outputs.version }}

      - name: Pogues-Model lib tag verification
        id: check-tag
        run: |
          if [[ "${{ steps.check-tag-exists.outputs.exists }}" == "false" ]]; then
            echo "The tag v${{ steps.get-version.outputs.version }} doesn't exist in Pogues-Model repo."
            exit 1
          fi

  check-version:
    needs: pogues-model
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.version-number.outputs.value }}
      previous-version: ${{ steps.previousTag.outputs.previousTag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0 # needed to get previous tag

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Get Version
        id: version-step
        run: |
          echo "version=$(mvn -f pom.xml help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Get previous final release tag
        id: previousTag
        run: echo "previousTag=$(git --no-pager tag --sort=creatordate --merged ${{ github.ref_name }} | grep "^[3-9]\.[0-9]\+\.[0-9]\+$" | tail -1)" >> $GITHUB_OUTPUT
        # Note: the regex works for single digit major version, to be updated if the version goes 10.0.0 or more

      - name: Compare version to previous release tag
        id: compare-step
        run: |
          echo ""
          echo "version:  ${{ steps.version-step.outputs.version }}"
          echo "Previous tag: ${{ steps.previousTag.outputs.previousTag }}"

          yesOrNo="no"
          if [[ ${{steps.version-step.outputs.version != steps.previousTag.outputs.previousTag}} ]]; then
            yesOrNo="yes"
          fi
          echo "Was the version changed? $yesOrNo"
          echo "hasVersionChanged=$yesOrNo" >> $GITHUB_OUTPUT

      - name: (Semantic version) Calculate release version
        if: ${{ steps.compare-step.outputs.hasVersionChanged == 'no' }}
        id: compute-version
        #uses: <find an action that does the job>
        run: |
          echo "Semantic version is not implemented yet ❌️"
          echo "Bump the version to trigger the release workflow."
          exit 1

      - name: Release version number
        id: version-number
        run: |
          versionNumber="undefined" # update this when semantic version is done
          if [[ ${{steps.compare-step.outputs.hasVersionChanged}} == "yes" ]]; then
            versionNumber=${{ steps.version-step.outputs.version }}
          fi
          echo "Version to be released: $versionNumber"
          echo "value=$versionNumber" >> $GITHUB_OUTPUT

      - name: Check tag existence
        id: check-tag-exists
        uses: mukunku/tag-exists-action@5c39604fe8aef7e65acb6fbcf96ec580f7680313 # v1.7.0
        with:
          tag: ${{ steps.version-step.outputs.version }}

      - name: Tag verification
        run: |
          if [[ "${{ steps.check-tag-exists.outputs.exists }}" == "true" ]]; then
            echo "Version ${{ steps.version-number.outputs.value }} cannot be released, tag already exists"
            exit 1
          fi

          if ! [[ "${{ steps.version-number.outputs.value }}" =~ ^[0-9]+.[0-9]+.[0-9]+$ ]]; then
            echo "The version ${{ steps.version-number.outputs.value }} is not in correct release format X.Y.Z"
            exit 1
          fi

  build-sources:
    needs: [pogues-model, check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Checkout Pogues-Model lib repo
        if: ${{ needs.pogues-model.outputs.available == 'false' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.pogues-model.outputs.version }}
          repository: InseeFr/Pogues-Model
          path: Pogues-Model

      - name: Build Pogues-Model lib
        if: ${{ needs.pogues-model.outputs.available == 'false' }}
        working-directory: ./Pogues-Model
        run: mvn install --no-transfer-progress -DskipTests=true -Dmaven.javadoc.skip=true

      - uses: actions/checkout@v4
      - name: Build Pogues-Back-Office with Maven
        run: mvn package -B -V --file pom.xml --no-transfer-progress

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/pogues-bo.jar

  create-release:
    needs: [check-version, build-sources]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        uses: rickstaa/action-create-tag@a1c7777fcb2fee4f19b0f283ba888afa11678b72 # v1.7.2
        with:
          tag: ${{ needs.check-version.outputs.release-version }}

      - name: Create release note
        id: changelog
        uses: requarks/changelog-action@b78a3354a01f4a1affb484b9264b506a815c46b1 # v1.10.3
        with:
          fromTag: ${{ needs.check-version.outputs.release-version }}
          toTag: ${{ needs.check-version.outputs.previous-version }}
          excludeTypes: ${{ env.RELEASE_NOTE_EXCLUDED_TYPES }}
          token: ${{ secrets.GITHUB_TOKEN }}
          writeToFile: false

      - name: Download build
        id: download
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: target/

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.check-version.outputs.release-version }}
          target_commitish: ${{ github.head_ref || github.ref }}
          name: ${{ needs.check-version.outputs.release-version }}
          body: ${{ steps.changelog.outputs.changes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-docker:
    needs: [check-version, build-sources]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download jar
        id: download
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: target/

      - name: Publish to Docker Hub
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: inseefr/pogues-back-office
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          default_branch: ${{ github.ref }}
          tags: "latest,${{ needs.check-version.outputs.release-version }}"
